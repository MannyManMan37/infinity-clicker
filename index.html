<!DOCTYPE html>
<html>
<head>
    <title>Void Clicker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="code.png" type="image/x-icon" />
    <style>
        body { 
            background-image: url("yo.png"); 
            color: white; 
            font-family: "Segoe UI", sans-serif; 
            display: flex; 
            margin: 0; 
            height: 100vh;  
            background-size: cover; 
        }
        .sidebar {
            width: 280px;
            background: rgba(0,0,0,0.85);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-right: 2px solid #8A2BE2;
        }
        #idk, #rebirthCounter, #prestigePoints { 
            background: rgba(0,0,0,0.5); 
            border: 2px solid #8A2BE2; 
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        button {
            min-height:50px;
            border:none;
            border-radius:8px;
            color:#8A2BE2;
            background:#B8B9BB;
            cursor:pointer;
        }
        .shop { flex:1; padding:20px; overflow-y:auto; }
        .shop-item { padding:10px; background:#111; margin-bottom:5px; cursor:pointer; }
        .credits-box { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#000; padding:20px; border:2px solid white;}
        #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);}
        .achievement-message { background:#8A2BE2; padding:10px; margin:5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>Void Clicker</h1>
    <p id="idk">Clicks: 0</p>
    <p id="rebirthCounter">Rebirths: 0</p>
    <p id="prestigePoints">Premium Coins: 0</p>

    <button onclick="clickHandler()">Click</button>
    <button onclick="rebirth()">Rebirth</button>
    <button onclick="showAchievementsMenu()">Achievements</button>
</div>

<div class="shop"></div>

<div id="overlay" onclick="closeAllModals()"></div>
<div id="statsBox" class="credits-box"><div id="statsContent"></div></div>
<div id="achievementPopup"></div>

<script>
/* ===== VARIABLES ===== */
let x = +localStorage.getItem("x") || 0;
let clickPower = +localStorage.getItem("clickPower") || 1;
let rebirths = +localStorage.getItem("rebirths") || 0;
let rebirthMultiplier = +localStorage.getItem("rebirthMultiplier") || 1;
let prestigePoints = +localStorage.getItem("prestigePoints") || 0;
let totalClicks = +localStorage.getItem("totalClicks") || 0;
let critsTriggered = +localStorage.getItem("critsTriggered") || 0;

/* ===== ACHIEVEMENTS ===== */
let achievements = JSON.parse(localStorage.getItem("achievements")) || {
    click1k:false,
    click10k:false,
    rebirth1:false,
    rebirth5:false,
    crit10:false
};

const achievementList = {
    click1k:{name:"Getting Started",desc:"Reach 1,000 clicks"},
    click10k:{name:"Click God",desc:"Reach 10,000 clicks"},
    rebirth1:{name:"Reborn",desc:"Do your first rebirth"},
    rebirth5:{name:"Addicted",desc:"Reach 5 rebirths"},
    crit10:{name:"Lucky!",desc:"Trigger 10 critical clicks"}
};

/* ===== DISPLAY ===== */
function updateDisplay(){
    document.getElementById("idk").innerText = "Clicks: " + Math.floor(x);
    document.getElementById("rebirthCounter").innerText = "Rebirths: " + rebirths;
    document.getElementById("prestigePoints").innerText = "Premium Coins: " + prestigePoints;
}

/* ===== NOTIFICATION ===== */
function showNotification(msg){
    const popup=document.createElement("div");
    popup.className="achievement-message";
    popup.innerText=msg;
    document.getElementById("achievementPopup").appendChild(popup);
    setTimeout(()=>popup.remove(),3000);
}

/* ===== CLICK ===== */
function clickHandler(){
    let gain = clickPower * rebirthMultiplier;
    if(Math.random()<0.1){ gain*=3; critsTriggered++; }
    x+=gain; totalClicks+=gain;

    checkAchievements();
    saveData(); updateDisplay();
}

/* ===== REBIRTH ===== */
function rebirth(){
    if(x>=1000){
        rebirths++; prestigePoints++;
        x=0; clickPower=1;

        checkAchievements();
        saveData(); updateDisplay();
        showNotification("Rebirth complete!");
    }
}

/* ===== SHOP ===== */
const shopDiv=document.querySelector(".shop");
function renderShop(){
    shopDiv.innerHTML="<h2>Shop</h2>";
    for(let i=1;i<=5;i++){
        let cost=i*100;
        let div=document.createElement("div");
        div.className="shop-item";
        div.innerText=`+${i} power (Cost ${cost})`;
        div.onclick=()=>{ if(x>=cost){ x-=cost; clickPower+=i; saveData(); updateDisplay(); }};
        shopDiv.appendChild(div);
    }
}

/* ===== ACHIEVEMENTS LOGIC ===== */
function checkAchievements(){
    if(totalClicks>=1000 && !achievements.click1k) unlock("click1k");
    if(totalClicks>=10000 && !achievements.click10k) unlock("click10k");
    if(rebirths>=1 && !achievements.rebirth1) unlock("rebirth1");
    if(rebirths>=5 && !achievements.rebirth5) unlock("rebirth5");
    if(critsTriggered>=10 && !achievements.crit10) unlock("crit10");
}

function unlock(id){
    achievements[id]=true;
    const a = achievementList[id];
    showNotification("🏆 "+a.name);
}

/* ===== MENU ===== */
function showAchievementsMenu(){
    document.getElementById("overlay").style.display="block";
    document.getElementById("statsBox").style.display="block";

    let html="<h2>Achievements</h2>";
    for(let key in achievementList){
        let a=achievementList[key];
        html += (achievements[key]?"✅ ":"❌ ") + "<b>"+a.name+"</b><br>"+a.desc+"<hr>";
    }
    document.getElementById("statsContent").innerHTML=html;
}

function closeAllModals(){
    document.getElementById("overlay").style.display="none";
    document.getElementById("statsBox").style.display="none";
}

/* ===== SAVE ===== */
function saveData(){
    localStorage.setItem("x",x);
    localStorage.setItem("clickPower",clickPower);
    localStorage.setItem("rebirths",rebirths);
    localStorage.setItem("rebirthMultiplier",rebirthMultiplier);
    localStorage.setItem("prestigePoints",prestigePoints);
    localStorage.setItem("totalClicks",totalClicks);
    localStorage.setItem("critsTriggered",critsTriggered);
    localStorage.setItem("achievements",JSON.stringify(achievements));
}

/* ===== INIT ===== */
renderShop();
updateDisplay();
</script>

</body>
</html>
